services:
  coeval-rn:
    build:
      context: .
      dockerfile: Dockerfile
    image: coeval-rn:latest
    container_name: coeval-rn
    environment:
      EXPO_NO_TELEMETRY: "1"
      NODE_ENV: development
      HOST: 0.0.0.0
      EXPO_PUBLIC_ROBLE_DB_NAME: coeval_b65ae2515f
      EXPO_PUBLIC_ROBLE_AUTH_URL: https://roble-api.openlab.uninorte.edu.co/auth
      EXPO_PUBLIC_ROBLE_DATABASE_URL: https://roble-api.openlab.uninorte.edu.co/database
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
      - "19006:19006"
    volumes:
      - ./:/app:Z
      - coeval_rn_node_modules:/app/node_modules
    stdin_open: true
    tty: true
    restart: unless-stopped
    command: ["npx", "expo", "start", "--tunnel"]

volumes:
  coeval_rn_node_modules: